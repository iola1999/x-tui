name: release

# Publishing this workflow to npm requires the repo secret NPM_TOKEN to be
# set (an automation-scope npm access token). Without it the `publish` job
# is skipped via the `if:` guard below — draft releases also skip publish.

on:
  # User-triggered release. Supply either a fresh tag (e.g. v0.1.0) that
  # doesn't exist yet (workflow will create it), or a tag that already exists.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
      draft:
        description: "Create as draft?"
        required: false
        default: "false"
  # Also trigger when a vN.N.N tag is pushed directly, for git-flow users.
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # needed for npm --provenance

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Package source tarball
        id: pack
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          mkdir -p release
          tar -czf "release/x-tui-${TAG}-source.tar.gz" \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./dist' \
            --exclude='./release' \
            .
          tar -czf "release/x-tui-${TAG}-dist.tar.gz" -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/
          retention-days: 7

      - name: Smoke check (non-interactive bootstrap)
        # The full app needs a TTY so we can't render it here. This just
        # verifies the entry module loads and fails fast for non-TTY, which
        # catches most import / wiring regressions.
        run: |
          if bun src/entrypoints/cli.tsx < /dev/null 2>&1 | grep -q "x-tui requires an interactive terminal"; then
            echo "OK"
          else
            echo "Expected the non-TTY guard message; got:"
            bun src/entrypoints/cli.tsx < /dev/null 2>&1 || true
            exit 1
          fi

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
          body: |
            Install from NPM:
            ```bash
            npm install -g x-tui
            x-tui
            ```
            Or run one-off:
            ```bash
            npx x-tui
            ```
            Or clone source:
            ```bash
            git clone https://github.com/iola1999/x-tui
            cd x-tui
            bun install
            bun run dev
            ```
            Requires [`twitter`](https://github.com/jackwener/twitter-cli) CLI authenticated (`twitter auth login`).

  publish:
    needs: verify
    runs-on: ubuntu-latest
    # Skip publish on draft releases and when NPM_TOKEN isn't configured.
    if: ${{ github.event.inputs.draft != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Sync package version to tag
        # tags look like v0.1.0; npm needs the bare version string. We rewrite
        # package.json in place rather than committing, since the git tag is
        # the source of truth.
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          cat package.json | head -3

      - name: Build bundle
        # Explicit build so a failure here fails the job before npm publish
        # runs (prepublishOnly would also catch it, but later).
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
